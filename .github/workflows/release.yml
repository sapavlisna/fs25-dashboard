name: Release

# Triggered when a tag like v1.0.0 is pushed. Builds:
#   1. The FS25 Lua mod ZIP            (drop into FS25 mods folder)
#   2. The Node.js server as a single  Windows .exe via pkg, bundled with a
#      tiny end-user readme + config.example.json in a ZIP.
#   3. The relay server source ZIP     (optional self-host for read-only sharing).
# All three ZIPs are attached to a GitHub Release automatically.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Node 20 is being deprecated for GitHub Actions JS runtime (forced to Node 24
# on 2026-06-02). Opt in now via FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 — applies
# to actions/checkout, actions/setup-node, action-gh-release etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ─── Mod ZIP ─────────────────────────────────────────────────────────
      # FS25 mods must have files at the archive root (not under a folder).
      - name: Build mod ZIP
        run: |
          cd FS25
          zip -r "../FS25_Dashboard.zip" . -x "*.bat" "*.bat.example"

      # ─── Single-file server build via pkg ────────────────────────────────
      # Build runtime = Node 24 (host for npm + pkg). The .exe still bakes in
      # node20 via package.json pkg --targets, because @yao-pkg/pkg ships
      # prebuilt binaries for that target and the runtime in the .exe is
      # independent of the host build.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: Server/package-lock.json

      - name: Install server deps
        working-directory: Server
        run: npm ci

      - name: Build single-file server (Windows x64)
        working-directory: Server
        run: npm run build

      # ─── Server bundle ZIP ───────────────────────────────────────────────
      - name: Package server bundle
        run: |
          mkdir -p dist-server
          cp Server/dist/FS25_Dashboard_Server.exe dist-server/
          cp Server/config.example.json dist-server/
          cat > dist-server/README.txt << 'EOF'
          FS25 Dashboard Server
          =====================

          1. Make sure the FS25_Dashboard mod is installed in your FS25 mods folder
             and enabled in the in-game mod menu of your save.

          2. Double-click FS25_Dashboard_Server.exe.
             - First run may take a few seconds while the server starts.
             - A console window will show the server log. Keep it open.

          3. Open http://localhost:3000 in your browser.

          Configuration (optional):
          - Copy config.example.json to config.local.json (same folder as the .exe)
            and edit the keys you want to change.
          - Or set environment variables before running:
              set DASHBOARD_PORT=4000
              set FS25_DOCS_DIR=D:\Games\FS25-Docs
              FS25_Dashboard_Server.exe

          Stopping the server: close the console window (or press Ctrl+C in it).

          Project: https://github.com/Sapavlisna/fs25-dashboard
          EOF
          cd dist-server && zip -r "../FS25_Dashboard_Server.zip" .

      # ─── Relay source ZIP ────────────────────────────────────────────────
      # Source bundle for whoever self-hosts the relay (Docker / Tailscale).
      # Secrets (publishers.json, .env) are gitignored so they aren't in the
      # checkout; the -x guards belt-and-suspenders. node_modules is rebuilt by
      # the Docker image, so it's excluded too.
      - name: Package relay bundle
        run: |
          cd Relay
          zip -r "../FS25_Dashboard_Relay.zip" . \
            -x "node_modules/*" "publishers.json" ".env" "deploy-relay.ps1"

      # ─── Release ─────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: |
            ## FS25 Dashboard ${{ steps.version.outputs.version }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Install

            **1. The in-game mod**
            Download `FS25_Dashboard.zip` and drop it into:
            `Documents/My Games/FarmingSimulator2025/mods/`

            **2. The dashboard server**
            Download `FS25_Dashboard_Server.zip`, extract anywhere, double-click
            `FS25_Dashboard_Server.exe`. Open http://localhost:3000.

            No Node.js installation required — the server is a single bundled
            Windows executable (~50 MB).

            **3. (Optional) The relay server**
            Only needed if you want to share your dashboard read-only over the
            internet. Download `FS25_Dashboard_Relay.zip` and deploy it on a
            Docker host — see `Relay/README.md` inside the archive.
          files: |
            FS25_Dashboard.zip
            FS25_Dashboard_Server.zip
            FS25_Dashboard_Relay.zip
          draft: false
          prerelease: false
